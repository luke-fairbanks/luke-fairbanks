<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" role="img" aria-labelledby="title desc">
  <title id="title">Luke Fairbanks — developer profile</title>
  <desc id="desc">Turning recurring annoyances into shipped software, with a focus on local-first apps, macOS, MCP, and developer tools.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117" />
      <stop offset="1" stop-color="#121b2b" />
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f81f7" />
      <stop offset="0.55" stop-color="#a371f7" />
      <stop offset="1" stop-color="#f05a2a" />
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1" />
    </pattern>
  </defs>

  <rect x="1" y="1" width="1278" height="298" rx="24" fill="url(#background)" stroke="url(#border)" stroke-width="2" />
  <rect x="2" y="2" width="1276" height="296" rx="23" fill="url(#grid)" />

  <circle cx="42" cy="38" r="6" fill="#ff5f57" />
  <circle cx="63" cy="38" r="6" fill="#febc2e" />
  <circle cx="84" cy="38" r="6" fill="#28c840" />
  <text x="110" y="45" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">~/luke/build</text>

  <text x="54" y="128" fill="#f0f6fc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="50" font-weight="700" letter-spacing="-1">turning recurring annoyances</text>
  <text x="54" y="184" fill="#f0f6fc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="50" font-weight="700" letter-spacing="-1">into shipped software</text>
  <text x="56" y="235" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="19">local-first / macOS / MCP / developer tools</text>
  <rect x="57" y="255" width="13" height="3" rx="1.5" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite" />
  </rect>

  <rect x="900" y="66" width="320" height="168" rx="16" fill="#161b22" stroke="#30363d" />
  <text x="926" y="101" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">current focus</text>

  <rect x="926" y="119" width="106" height="36" rx="18" fill="#1f6feb" fill-opacity="0.22" stroke="#388bfd" stroke-opacity="0.65" />
  <text x="979" y="142" text-anchor="middle" fill="#cae8ff" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">macOS</text>

  <rect x="1044" y="119" width="78" height="36" rx="18" fill="#8957e5" fill-opacity="0.22" stroke="#a371f7" stroke-opacity="0.65" />
  <text x="1083" y="142" text-anchor="middle" fill="#e2c5ff" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">MCP</text>

  <rect x="1134" y="119" width="60" height="36" rx="18" fill="#238636" fill-opacity="0.22" stroke="#3fb950" stroke-opacity="0.65" />
  <text x="1164" y="142" text-anchor="middle" fill="#b7f5c3" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">local</text>

  <rect x="926" y="170" width="98" height="36" rx="18" fill="#30363d" stroke="#484f58" />
  <text x="975" y="193" text-anchor="middle" fill="#d2a8ff" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">Rust</text>

  <rect x="1036" y="170" width="158" height="36" rx="18" fill="#30363d" stroke="#484f58" />
  <text x="1115" y="193" text-anchor="middle" fill="#79c0ff" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">TypeScript</text>
</svg>
